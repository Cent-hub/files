<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Professor Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-page" class="page active">
    <nav class="topnav">
      <div class="nav-brand">
        <div class="dot">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        Professor Dashboard
      </div>
      <div class="nav-right">
        <span class="nav-user" id="nav-name">Hello, Professor</span>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </nav>

    <div class="app-body">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content">
        <div id="content-area"></div>
      </main>
    </div>
  </div>

  <div class="overlay" id="attend-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="attend-modal-title"></h2>
        <button onclick="closeModal('attend-modal')">×</button>
      </div>
      <div class="modal-body" id="attend-modal-body"></div>
    </div>
  </div>

  <script>
    const storedUser = localStorage.getItem('att_user');
    if (!localStorage.getItem('att_token') || !storedUser) {
      window.location.href = 'index.html';
    } else {
      try {
        const current = JSON.parse(storedUser);
        if (current.role !== 'teacher') window.location.href = 'index.html';
      } catch {
        window.location.href = 'index.html';
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
